<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>مولّد الهاش</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hash Gen">
<meta name="theme-color" content="#0d0d14">
<link rel="apple-touch-icon" href="https://raw.githubusercontent.com/AnwarAboSaad/Hash-Generator/main/logo.png">
<link rel="icon" type="image/png" href="https://raw.githubusercontent.com/AnwarAboSaad/Hash-Generator/main/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Tajawal',sans-serif;background:#0d0d14;color:#eeeef8;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.box{width:100%;max-width:400px}
.logo{text-align:center;margin-bottom:32px}
.logo div:first-child{font-size:48px;margin-bottom:8px}
.logo h1{font-size:22px;font-weight:900;color:#f6a832}
.logo p{font-size:13px;color:#9191b4;margin-top:4px}
.card{background:#1a1a28;border:1px solid #2e2e48;border-radius:14px;padding:20px}
.sec{font-size:11px;font-weight:700;color:#f6a832;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.fg{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.fg label{font-size:12px;color:#9191b4;font-weight:600}
.fg input{background:#0d0d14;border:1px solid #2e2e48;border-radius:10px;padding:12px 14px;color:#eeeef8;font-family:'Tajawal',sans-serif;font-size:15px;width:100%;-webkit-appearance:none}
.fg input:focus{outline:none;border-color:#f6a832}
.btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:13px;border-radius:10px;border:none;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:15px;font-weight:700;background:#f6a832;color:#000;margin-bottom:10px;transition:opacity .15s}
.btn:active{opacity:.8}
.result-box{background:#0d0d14;border:1px solid #2e2e48;border-radius:10px;padding:12px 14px;display:none}
.result-label{font-size:11px;color:#9191b4;margin-bottom:6px}
.result-hash{font-size:12px;color:#22c55e;word-break:break-all;font-family:monospace;line-height:1.6}
.copy-btn{margin-top:8px;background:#222234;border:1px solid #2e2e48;color:#eeeef8;border-radius:8px;padding:8px 14px;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:700;cursor:pointer;width:100%;transition:background .15s,color .15s}
.copy-btn.copied{background:#f6a832;color:#000}
.note{font-size:12px;color:#9191b4;text-align:center;margin-top:16px;line-height:1.8}
</style>
</head>
<body>
<div class="box">
  <div class="logo">
    <div>🔐</div>
    <h1>مولّد الهاش</h1>
    <p>SHA-256 — العمليات محلية على جهازك فقط</p>
  </div>

  <div class="card">
    <div class="sec">النص</div>
    <div class="fg">
      <label>اكتب النص أو كلمة المرور</label>
      <input type="text" id="input" placeholder="مثال: MyPass2026" dir="auto">
    </div>
    <button class="btn" onclick="genHash()">⚡ توليد الهاش</button>
    <div class="result-box" id="result">
      <div class="result-label">الهاش (SHA-256)</div>
      <div class="result-hash" id="hash-output"></div>
      <button class="copy-btn" id="copy-btn" onclick="copyHash()">📋 نسخ</button>
    </div>
  </div>

  <p class="note">لا يُحفظ أي شيء — كل شيء يعمل محلياً في متصفحك</p>
</div>

<script>
async function sha256(msg){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function genHash(){
  const val=document.getElementById('input').value.trim();
  if(!val){alert('اكتب النص أولاً');return;}
  const hash=await sha256(val);
  document.getElementById('hash-output').textContent=hash;
  document.getElementById('result').style.display='block';
}
document.getElementById('input').addEventListener('keydown',e=>{if(e.key==='Enter')genHash();});
async function copyHash(){
  const text=document.getElementById('hash-output').textContent;
  const btn=document.getElementById('copy-btn');
  try{
    await navigator.clipboard.writeText(text);
    btn.textContent='✅ تم النسخ';
    btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='📋 نسخ';btn.classList.remove('copied');},1500);
  }catch{
    prompt('انسخ الهاش يدوياً:',text);
  }
}
</script>
</body>
</html>
